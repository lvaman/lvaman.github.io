<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan de table</title>
    <link rel="stylesheet" href="style.css">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";
    
        // Votre configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDPCMCi4BB2dySCc8G4adLYQXJSk-903v0",
            authDomain: "weddingchart.firebaseapp.com",
            projectId: "weddingchart",
            storageBucket: "weddingchart.firebasestorage.app",
            messagingSenderId: "345074315998",
            appId: "1:345074315998:web:ae600053bcbe04a977884f"
        };
    
        // Initialisation de Firebase
        const app = initializeApp(firebaseConfig);
    
        // Rendre l'instance de la base de données et les fonctions accessibles globalement
        window.db = getFirestore(app);
        window.doc = doc;
        window.setDoc = setDoc;
        window.onSnapshot = onSnapshot;
        window.collection = collection;
    </script>
</head>
<body>

    <div class="header">
        <h1>Plan de table 👩‍❤️‍👨</h1>
        <p>Invités placés: <span id="master-counter">0/0</span></p>
    </div>

    <div class="main-container">
        <div id="groom-guests" class="guest-list drop-zone">
            <h2>Long Vân<br><span id="groom-list-counter"></span></h2>
        </div>

        <div id="bride-guests" class="guest-list drop-zone">
            <h2>Manal<br><span id="bride-list-counter"></span></h2>
        </div>

        <div id="tables-container"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const groomListContainer = document.getElementById('groom-guests');
            const brideListContainer = document.getElementById('bride-guests');
            const tablesContainer = document.getElementById('tables-container');
            const masterCounterEl = document.getElementById('master-counter');
        
            let allGuests, allDropZones, totalGuests;
            const db = window.db;

            const initialGroomGuestsData = [
                "Long Vân",
                "Cau 3", "Cau 4", "Cau 7", "Cau 8",
                "Mo 4", "Mo 8", "Di Ut",
                "Má", "Na", "Thy", "Thu", "Jimmy",
                "Hieu", "Thao", "Kien", "Danny", "Julia", "Nam",
                "Ba", "Hong Minh", "Bo Xi",
                "Ong Mien", "Mai Dung", "Clément", "Matis",
                "Hoa Dung", "Benjamin", "Amandine", "Timothe", "Margaux",
                "Chu Tran", "Virginie", "Emilien", "Flora",
                "Co Be", "Chu Vu", "Ong 6", "Ba 6", "Ba Sang", "Ong Quyen",
                "Idriss", "Marc-Olivier", "Yasmine", "Aude", "Tristan",
                "Léo", "Mai-Lan", "Uyen-My", "Bao", "Hadrien", "Ines", "Louis", "Virgile", "Zakaria"
            ];
            const initialBrideGuestsData = [
                "Manal",
                "Dounia", "Karim", "Tata Hiba", "Masraf Amina", "Masraf Nadir", "Adra", "Fethi", "Fatima", "3aziz", "Khali jilali", "Sorya", "Salhi Amina + Iyed", "Amine", "Brahim", "Fatema", "M Yannis", "P Yannis",
                "Léa Coache", "Adrien Prevost", "Axel Derrien", "Claire Tualle", "Charly", "Shelsy Audouard", "Taqwa", "Sumeyra Solak", "Hatice Solak", "Dalia Solak", "Henene Mestari", "Derghal Amira", "Yannis messaoud", "Derghal Yanis", "Derghal Ryad", "Derghal Nadir", "Derghal Salima", "Derghal Wissem", "Derghal Sanaa", "Lakehal Ibtihal", "Younes mari ibtihal", "Lakeha Rihem", "Lakehal Bachir", "Lakehal Yasmina", "Kamal", "Amine", "Elimane", "Jordan", "Luca", "Zoe"
            ];

            async function initializeBoard() {
                groomListContainer.innerHTML = '<h2>Long Vân<br><span id="groom-list-counter"></span></h2>';
                brideListContainer.innerHTML = '<h2>Manal<br><span id="bride-list-counter"></span></h2>';
                tablesContainer.innerHTML = '';
        
                initialGroomGuestsData.forEach((name, index) => {
                    groomListContainer.innerHTML += `<div class="guest groom" id="groom-${index}" draggable="true">${name}</div>`;
                });
                initialBrideGuestsData.forEach((name, index) => {
                    brideListContainer.innerHTML += `<div class="guest bride" id="bride-${index}" draggable="true">${name}</div>`;
                });

                const headTableCapacity = 2;
                tablesContainer.innerHTML += `
                    <div class="table-drop-zone drop-zone" id="table-head" data-capacity="${headTableCapacity}">
                        <h3>Table d'honneur</h3>
                        <span class="table-counter">0 / ${headTableCapacity}</span>
                        <div class="table-guests-container"></div>
                    </div>`;

                const numberOfTables = 15;
                const tableCapacity = 10;
                for (let i = 1; i <= numberOfTables; i++) {
                    tablesContainer.innerHTML += `
                        <div class="table-drop-zone drop-zone" id="table-${i}" data-capacity="${tableCapacity}">
                            <h3>Table ${i}</h3>
                            <span class="table-counter">0 / ${tableCapacity}</span>
                            <div class="table-guests-container"></div>
                        </div>`;
                }
        
                await listenForRealtimeUpdates(); // Remplace loadFromFirebase()
        
                allGuests = document.querySelectorAll('.guest');
                allDropZones = document.querySelectorAll('.drop-zone');
                totalGuests = initialGroomGuestsData.length + initialBrideGuestsData.length;
                addDragDropListeners();
                updateAllCounters(initialGroomGuestsData.length, initialBrideGuestsData.length);
            }
        
            function updateAllCounters(totalGroom, totalBride) {
                let placedGuestsCount = 0;
                document.querySelectorAll('.table-drop-zone').forEach(table => {
                    const guestsInTable = table.querySelector('.table-guests-container').querySelectorAll('.guest').length;
                    placedGuestsCount += guestsInTable;
                    table.querySelector('.table-counter').textContent = `${guestsInTable} / ${table.dataset.capacity}`;
                });
                masterCounterEl.textContent = `${placedGuestsCount} / ${totalGroom + totalBride}`;
        
                document.getElementById('groom-list-counter').textContent =
                    `(${groomListContainer.querySelectorAll('.guest').length} / ${totalGroom})`;
                document.getElementById('bride-list-counter').textContent =
                    `(${brideListContainer.querySelectorAll('.guest').length} / ${totalBride})`;
            }
        
            function getDragAfterElement(container, y) {
                const draggableElements = [...container.querySelectorAll('.guest:not(.is-dragging)')];
                return draggableElements.reduce((closest, child) => {
                    const box = child.getBoundingClientRect();
                    const offset = y - box.top - box.height / 2;
                    if (offset < 0 && offset > closest.offset) {
                        return { offset: offset, element: child };
                    } else {
                        return closest;
                    }
                }, { offset: Number.NEGATIVE_INFINITY }).element;
            }
        
            function addDragDropListeners() {
                allGuests.forEach(guest => {
                    guest.addEventListener('dragstart', e => {
                        e.dataTransfer.setData('text/plain', e.target.id);
                        setTimeout(() => e.target.classList.add('is-dragging'), 0);
                    });
                    guest.addEventListener('dragend', e => e.target.classList.remove('is-dragging'));
                });
        
                allDropZones.forEach(zone => {
                    zone.addEventListener('dragover', e => {
                        e.preventDefault();
                        const id = e.dataTransfer.getData('text/plain');
                        const draggableElement = document.getElementById(id);
                        if (!draggableElement) return;
        
                        const isGroomGuest = draggableElement.classList.contains('groom');
                        const isBrideGuest = draggableElement.classList.contains('bride');
        
                        if (zone.id === 'groom-guests' && isBrideGuest) {
                            e.dataTransfer.dropEffect = 'none';
                            return;
                        }
                        if (zone.id === 'bride-guests' && isGroomGuest) {
                            e.dataTransfer.dropEffect = 'none';
                            return;
                        }
        
                        e.dataTransfer.dropEffect = 'move';
        
                        const capacity = parseInt(zone.dataset.capacity) || Infinity;
                        const currentCount = zone.querySelector('.table-guests-container') ? zone.querySelector('.table-guests-container').querySelectorAll('.guest:not(.is-dragging)').length : zone.querySelectorAll('.guest:not(.is-dragging)').length;

                        if (zone.classList.contains('table-drop-zone') && currentCount >= capacity) {
                            zone.classList.add('table-full');
                            e.dataTransfer.dropEffect = 'none';
                            return;
                        } else {
                            zone.classList.remove('table-full');
                        }
        
                        zone.classList.add('drag-over');
                    });
                    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over', 'table-full'));
                    zone.addEventListener('drop', e => {
                        e.preventDefault();
                        zone.classList.remove('drag-over', 'table-full');
                        const id = e.dataTransfer.getData('text/plain');
                        const draggableElement = document.getElementById(id);
                        if (!draggableElement) return;

                        const isGroomGuest = draggableElement.classList.contains('groom');
                        const isBrideGuest = draggableElement.classList.contains('bride');
        
                        if ((zone.id === 'groom-guests' && isBrideGuest) || (zone.id === 'bride-guests' && isGroomGuest)) {
                            return;
                        }

                        if (zone.classList.contains('table-drop-zone')) {
                            const capacity = parseInt(zone.dataset.capacity);
                            const currentCount = zone.querySelector('.table-guests-container').querySelectorAll('.guest').length;
                            if (currentCount < capacity) {
                                zone.querySelector('.table-guests-container').appendChild(draggableElement);
                                saveToFirebase();
                            }
                        } else {
                            const container = zone;
                            const afterElement = getDragAfterElement(container, e.clientY);
                            if (afterElement == null) {
                                container.appendChild(draggableElement);
                            } else {
                                container.insertBefore(draggableElement, afterElement);
                            }
                            saveToFirebase();
                        }
                        // updateAllCounters(initialGroomGuestsData.length, initialBrideGuestsData.length); // Désactivé pour laisser la mise à jour en temps réel s'en occuper
                    });
                });
            }
        
            async function saveToFirebase() {
                const seating = {};
                document.querySelectorAll('.table-drop-zone').forEach(table => {
                    const guestIds = [...table.querySelector('.table-guests-container').querySelectorAll('.guest')].map(guest => guest.id);
                    if (guestIds.length > 0) {
                        seating[table.id] = guestIds;
                    }
                });

                seating['groom-guests'] = [...groomListContainer.querySelectorAll('.guest')].map(guest => guest.id);
                seating['bride-guests'] = [...brideListContainer.querySelectorAll('.guest')].map(guest => guest.id);
                
                try {
                    await setDoc(doc(db, "seatingPlans", "currentPlan"), seating);
                    console.log("Plan sauvegardé sur Firebase !");
                } catch (e) {
                    console.error("Erreur lors de la sauvegarde :", e);
                }
            }

            function loadConfiguration(config) {
                // Créer une copie des invités existants pour les déplacer
                const allGuestsMap = new Map();
                document.querySelectorAll('.guest').forEach(guest => allGuestsMap.set(guest.id, guest));

                Object.keys(config).forEach(zoneId => {
                    const zoneElement = document.getElementById(zoneId);
                    if (zoneElement) {
                        // Vider le conteneur avant de recharger pour éviter les doublons
                        if (zoneElement.classList.contains('table-drop-zone')) {
                             zoneElement.querySelector('.table-guests-container').innerHTML = '';
                        } else {
                            zoneElement.innerHTML = '';
                             // Recréer le titre et le compteur pour les listes principales
                             if (zoneId === 'groom-guests') {
                                 zoneElement.innerHTML = '<h2>Long Vân<br><span id="groom-list-counter"></span></h2>';
                             }
                             if (zoneId === 'bride-guests') {
                                 zoneElement.innerHTML = '<h2>Manal<br><span id="bride-list-counter"></span></h2>';
                             }
                        }

                        // Déplacer les invités vers leur nouvelle position
                        config[zoneId].forEach(guestId => {
                            const guestElement = allGuestsMap.get(guestId);
                            if (guestElement) {
                                if (zoneElement.classList.contains('table-drop-zone')) {
                                    zoneElement.querySelector('.table-guests-container').appendChild(guestElement);
                                } else {
                                    zoneElement.appendChild(guestElement);
                                }
                            }
                        });
                    }
                });
                updateAllCounters(initialGroomGuestsData.length, initialBrideGuestsData.length);
            }

            function listenForRealtimeUpdates() {
                const docRef = doc(db, "seatingPlans", "currentPlan");
                return new Promise((resolve, reject) => {
                    onSnapshot(docRef, (docSnap) => {
                        if (docSnap.exists()) {
                            const config = docSnap.data();
                            console.log("Mise à jour en temps réel reçue !");
                            loadConfiguration(config);
                        } else {
                            console.log("Aucun plan trouvé sur Firebase. Initialisation des listes par défaut.");
                        }
                        resolve();
                    }, (error) => {
                        console.error("Erreur lors de la mise à jour en temps réel :", error);
                        reject(error);
                    });
                });
            }
        
            // Note: window.addEventListener('beforeunload', saveToFirebase); n'est plus nécessaire car les sauvegardes sont automatiques après chaque drop.
        
            initializeBoard();
        });
    </script>
    
</body>
</html>
